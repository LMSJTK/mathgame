version: '3.8'

services:
  mathgame-runtime:
    build: .
    container_name: mathgame-runtime
    ports:
      - "4173:4173"
    environment:
      - PORT=4173
    # Optional: If you want to develop and see changes without rebuilding,
    # you can mount your local directory to the container's working directory.
    # volumes:
    #   - .:/usr/src/app
    #   - /usr/src/app/node_modules

  mathgame-editor:
    build: ./tools/editor
    container_name: mathgame-editor
    ports:
      - "5180:5180"
    # Optional: For development with hot-reload, uncomment these lines
    # and change the command to use Vite dev server instead of the static build.
    # volumes:
    #   - ./tools/editor:/usr/src/app
    #   - /usr/src/app/node_modules