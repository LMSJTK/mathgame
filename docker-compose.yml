version: '3.8'

services:
  mathgame-runtime:
    build: .
    container_name: mathgame-runtime
    ports:
      - "4173:4173"
    environment:
      - PORT=4173
    # Optional: If you want to develop and see changes without rebuilding,
    # you can mount your local directory to the container's working directory.
    # volumes:
    #   - .:/usr/src/app
    #   - /usr/src/app/node_modules

  mathgame-editor:
    build: ./tools/editor
    container_name: mathgame-editor
    ports:
      - "5180:5180"
    # Optional: For development with hot-reload, uncomment these lines
    # and change the command to use Vite dev server instead of the static build.
    # volumes:
    #   - ./tools/editor:/usr/src/app
    #   - /usr/src/app/node_modules

  asset-server:
    build: ./tools/asset-editor/server
    container_name: mathgame-asset-server
    ports:
      - "4174:4174"
    environment:
      - ASSET_SERVER_PORT=4174
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REMBG_URL=http://rembg:5000
    # volumes:
    #   - ./tools/asset-editor/server:/usr/src/app
    #   - /usr/src/app/node_modules

  # Optional: Background removal service (rembg)
  # Uncomment to enable automatic background removal for generated sprites
  # rembg:
  #   image: danielgatis/rembg:latest
  #   container_name: mathgame-rembg
  #   ports:
  #     - "5000:5000"
  #   command: s